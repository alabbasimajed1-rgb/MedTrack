name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          
      - run: flutter create --platforms=android --project-name ot_tracker_pro .
      
      # 1. Force the beautiful App Name
      - run: sed -i 's/android:label="ot_tracker_pro"/android:label="OT TRACKER PRO"/g' android/app/src/main/AndroidManifest.xml
      
      # 2. Add Camera Permissions
      - run: sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
      
      # 3. Upgrade Android Compile SDK to 36 (Fixes Barcode Scanner crash)
      - run: sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/g' android/app/build.gradle
      
      # 4. Upgrade Android Minimum SDK to 21
      - run: sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
      
      # 5. Upgrade Kotlin to stop the "Duplicate Class" crash
      - run: sed -i 's/1.7.10/1.9.22/g' android/settings.gradle
      
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
