name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter create --platforms=android .
      
      # Forces the Home Screen Name to OT TRACKER PRO
      - run: sed -i 's/android:label="ot_tracker_pro"/android:label="OT TRACKER PRO"/g' android/app/src/main/AndroidManifest.xml
      
      # Safely injects Android Camera Permission for the Barcode Scanner
      - run: sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
      
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
